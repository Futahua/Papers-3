appId: com.futahua.papers
productName: Papers
copyright: Copyright © 2026 Futahua

directories:
  output: release
  buildResources: build

files:
  - out/**
  - package.json

extraResources:
  - from: programs
    to: programs
  - from: assets/icon.png
    to: icon.png
  - from: hermes-skin/papers-integration.patch
    to: hermes-integration/papers-integration.patch
  - from: hermes-skin/papers-theme-plugin.js
    to: hermes-integration/papers-theme-plugin.js

asar: true

# electron-builder embeds win.icon into the exe during a full (NSIS) build, but a
# `--dir` pack can skip that rcedit step and leave the stock Electron atom on the exe.
# This hook re-embeds build/icon.ico into the packed Papers.exe for every pack path.
afterPack: build/afterPack.cjs

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]
  artifactName: Papers-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: false
  createStartMenuShortcut: false
  artifactName: Papers-Setup-${version}.${ext}
