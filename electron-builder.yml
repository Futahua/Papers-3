appId: com.futahua.papers
productName: Papers
copyright: Copyright © 2026 Futahua

directories:
  output: release
  buildResources: build

files:
  - out/**
  - package.json

extraResources:
  - from: programs
    to: programs
  - from: assets/icon.png
    to: icon.png

asar: true

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]
  artifactName: Papers-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: false
  createStartMenuShortcut: false
  artifactName: Papers-Setup-${version}.${ext}
